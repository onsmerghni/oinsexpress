# ═══════════════════════════════════════════════════════════════
# OINSExpress Backend Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=oinsexpress-backend
server.port=${PORT:8080}

# ═══ Database (PostgreSQL en prod, H2 en dev) ═══
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:oinsexpress;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ═══ JWT ═══
oinsexpress.jwt.secret=${JWT_SECRET:VotreCleSecreteSuperLongueDeMinimum256BitsPourSecuriserLesTokensOINSExpressPFA2026}
oinsexpress.jwt.expiration=${JWT_EXPIRATION:86400000}
oinsexpress.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ═══ Email (SMTP) ═══
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
oinsexpress.mail.from=${MAIL_FROM}


# ═══ CORS ═══
oinsexpress.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:8100}

# ═══ ML Service ═══
oinsexpress.ml.python-script=${ML_SCRIPT_PATH:./ml/anomaly_detector.py}
oinsexpress.ml.stationary-timeout-minutes=10

# ═══ Logging ═══
logging.level.com.oinsexpress=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ═══ Actuator ═══
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized